<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Chroblox Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10; --accent: #ff4b4b; --accent-glow: rgba(255, 75, 75, 0.3);
            --text: #ffffff; --text-muted: #8b949e; --surface: rgba(20, 24, 32, 0.7);
        }
        body {
            margin: 0; background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
            overflow: hidden;
        }
        .error-container {
            text-align: center; z-index: 10; padding: 50px 40px; background: var(--surface);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); max-width: 600px; width: 90%;
        }
        h1 { font-size: 8rem; margin: 0; font-weight: 900; letter-spacing: -5px; color: var(--accent); text-shadow: 0 0 40px var(--accent-glow); line-height: 1; }
        h2 { font-size: 2rem; margin: 10px 0; font-weight: 700; }
        p { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 35px; }
        
        .action-buttons {
            display: flex; flex-direction: column; gap: 20px; align-items: center;
        }
        
        .back-btn {
            background: var(--accent); color: white; border: none; padding: 15px 40px;
            font-size: 1.1rem; font-weight: 800; border-radius: 16px; cursor: pointer;
            transition: 0.2s; text-decoration: none; font-family: inherit;
            box-shadow: 0 10px 25px var(--accent-glow); display: inline-block; width: 100%; box-sizing: border-box; max-width: 350px;
        }
        .back-btn:hover { filter: brightness(1.2); transform: translateY(-3px); }
        
        .social-divider {
            display: flex; align-items: center; width: 100%; max-width: 350px; margin: 10px 0; color: var(--text-muted); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px;
        }
        .social-divider::before, .social-divider::after { content: ""; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.1); margin: 0 15px; }
        
        .social-links { display: flex; gap: 15px; justify-content: center; width: 100%; max-width: 350px; }
        .social-btn { 
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; 
            padding: 12px; border-radius: 12px; text-decoration: none; font-weight: 700; 
            color: white; transition: 0.2s; font-size: 0.95rem;
        }
        .yt-btn { background: #ff0000; box-shadow: 0 5px 15px rgba(255,0,0,0.2); }
        .yt-btn:hover { background: #cc0000; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255,0,0,0.3); }
        
        .dc-btn { background: #5865F2; box-shadow: 0 5px 15px rgba(88,101,242,0.2); }
        .dc-btn:hover { background: #4752c4; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(88,101,242,0.3); }
        
        .social-icon { width: 20px; height: 20px; }
        
        /* Background FX */
        .glow-orb {
            position: absolute; width: 40vw; height: 40vw; background: var(--accent-glow);
            border-radius: 50%; filter: blur(100px); z-index: 0; opacity: 0.5; animation: float 6s ease-in-out infinite alternate; pointer-events: none;
        }
        @keyframes float { 0% { transform: translateY(0px) scale(1); } 100% { transform: translateY(-30px) scale(1.05); } }
        
        @media (max-width: 600px) {
            h1 { font-size: 6rem; }
            .social-links { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="glow-orb"></div>
    <div class="error-container">
        <h1>404</h1>
        <h2>Connection Lost</h2>
        <p>The sector of the workspace you are looking for doesn't exist or has been moved.</p>
        
        <div class="action-buttons">
            <a href="https://chroblox.online" class="back-btn">Return to Workspace</a>
            
            <div class="social-divider">Or Contact Us</div>
            
            <div class="social-links">
                <a href="https://www.youtube.com/@Gd7OS" target="_blank" class="social-btn yt-btn">

                    Gd7 OS

                    Discord
                </a>
            </div>
        </div>
    </div>
</body>
</html>
